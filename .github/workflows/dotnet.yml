name: .NET 10 Build & Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v5
      with:
        # '10.0.x' holt automatisch das neueste Patch-Release
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore ./dotnetrest.slnx

    - name: Build
      # --no-restore spart Zeit, da wir es im Schritt davor gemacht haben
      run: dotnet build ./dotnetrest.slnx --no-restore --configuration Release

    - name: Test
      # Führt Unit-Tests aus, falls vorhanden
      run: dotnet test ./dotnetrest.slnx --no-build --configuration Release --verbosity normal