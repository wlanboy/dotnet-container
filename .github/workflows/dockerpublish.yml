name: Docker build and publish image
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Determine image tag
      id: vars
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        else
          echo "tag=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build the Docker image
      run: |
        docker build \
          --build-arg REVISION=${{ github.sha }} \
          -t wlanboy/dotnet-container:${{ steps.vars.outputs.tag }} \
          -t wlanboy/dotnet-container:latest \
          ./dotnetrest
    - name: Docker Push
      run: |
        docker push wlanboy/dotnet-container:${{ steps.vars.outputs.tag }}
        docker push wlanboy/dotnet-container:latest